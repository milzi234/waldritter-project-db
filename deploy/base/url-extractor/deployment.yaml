apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-extractor
  labels:
    app: url-extractor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-extractor
  template:
    metadata:
      labels:
        app: url-extractor
    spec:
      containers:
        - name: url-extractor
          image: localhost:30500/waldritter/url-extractor:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: extractor-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
