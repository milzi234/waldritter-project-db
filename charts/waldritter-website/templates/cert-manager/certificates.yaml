{{- if and .Values.ingress.tls.enabled (eq .Values.ingress.tls.provider "cert-manager") .Values.ingress.tls.certManager.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "waldritter-website.fullname" . }}-website-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "waldritter-website.labels" . | nindent 4 }}
spec:
  secretName: {{ include "waldritter-website.fullname" . }}-website-tls
  issuerRef:
    name: {{ .Values.ingress.tls.certManager.issuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.ingress.hosts.website.host }}
  dnsNames:
    - {{ .Values.ingress.hosts.website.host }}
    - www.{{ .Values.ingress.hosts.website.host }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "waldritter-website.fullname" . }}-admin-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "waldritter-website.labels" . | nindent 4 }}
spec:
  secretName: {{ include "waldritter-website.fullname" . }}-admin-tls
  issuerRef:
    name: {{ .Values.ingress.tls.certManager.issuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.ingress.hosts.admin.host }}
  dnsNames:
    - {{ .Values.ingress.hosts.admin.host }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "waldritter-website.fullname" . }}-api-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "waldritter-website.labels" . | nindent 4 }}
spec:
  secretName: {{ include "waldritter-website.fullname" . }}-api-tls
  issuerRef:
    name: {{ .Values.ingress.tls.certManager.issuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.ingress.hosts.api.host }}
  dnsNames:
    - {{ .Values.ingress.hosts.api.host }}
{{- end }}