{{- if .Values.railsApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "waldritter-website.fullname" . }}-rails-api
  labels:
    {{- include "waldritter-website.railsApi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.railsApi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "waldritter-website.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: rails-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "waldritter-website.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: rails-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "waldritter-website.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: migrate
          image: "{{ .Values.railsApi.image.repository }}:{{ .Values.railsApi.image.tag }}"
          imagePullPolicy: {{ .Values.railsApi.image.pullPolicy }}
          command: ["bundle", "exec", "rails", "db:migrate"]
          env:
            - name: RAILS_HOSTS
              value: "api.{{ .Values.global.domain }},localhost"
            {{- with .Values.railsApi.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.railsApi.persistence.database.enabled }}
          volumeMounts:
            - name: database-storage
              mountPath: {{ .Values.railsApi.persistence.database.mountPath }}
          {{- end }}
      containers:
        - name: rails-api
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.railsApi.image.repository }}:{{ .Values.railsApi.image.tag }}"
          imagePullPolicy: {{ .Values.railsApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.railsApi.service.targetPort }}
              protocol: TCP
          env:
            - name: RAILS_HOSTS
              value: "api.{{ .Values.global.domain }},localhost"
            {{- with .Values.railsApi.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.railsApi.healthCheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.railsApi.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.railsApi.healthCheck.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.railsApi.healthCheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.railsApi.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.railsApi.healthCheck.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.railsApi.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.railsApi.persistence.database.enabled }}
            - name: database-storage
              mountPath: {{ .Values.railsApi.persistence.database.mountPath }}
            {{- end }}
            {{- if .Values.railsApi.persistence.storage.enabled }}
            - name: active-storage
              mountPath: {{ .Values.railsApi.persistence.storage.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.railsApi.persistence.database.enabled }}
        - name: database-storage
          persistentVolumeClaim:
            claimName: {{ include "waldritter-website.fullname" . }}-rails-db
        {{- end }}
        {{- if .Values.railsApi.persistence.storage.enabled }}
        - name: active-storage
          persistentVolumeClaim:
            claimName: {{ include "waldritter-website.fullname" . }}-rails-storage
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}