apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-ui
  labels:
    app: public-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-ui
  template:
    metadata:
      labels:
        app: public-ui
    spec:
      containers:
        - name: public-ui
          image: localhost:30500/waldritter/public-ui:latest
          ports:
            - containerPort: 4321
          env:
            - name: API_URL
              value: "http://rails-api:3000"
            - name: PUBLIC_API_URL
              value: "https://project-api.waldritter.dev"
          readinessProbe:
            httpGet:
              path: /
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
