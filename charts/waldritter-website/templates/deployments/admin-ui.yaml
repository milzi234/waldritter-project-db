{{- if .Values.adminUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "waldritter-website.fullname" . }}-admin-ui
  labels:
    {{- include "waldritter-website.adminUi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.adminUi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "waldritter-website.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "waldritter-website.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: admin-ui
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "waldritter-website.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: admin-ui
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.adminUi.image.repository }}:{{ .Values.adminUi.image.tag }}"
          imagePullPolicy: {{ .Values.adminUi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.adminUi.service.targetPort }}
              protocol: TCP
          env:
            - name: VITE_API_BASE_URL
              value: "https://api.{{ .Values.global.domain }}"
            {{- with .Values.adminUi.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.adminUi.healthCheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.adminUi.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.adminUi.healthCheck.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.adminUi.healthCheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.adminUi.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.adminUi.healthCheck.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.adminUi.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}